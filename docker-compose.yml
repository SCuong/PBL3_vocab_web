services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vocablearning_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Express"
      SA_PASSWORD: "${SA_PASSWORD}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init.sql:/init.sql
      - ./database/init-db.sh:/init-db.sh
    ports:
      - "1433:1433"
    command: >
      bash -c "
      /opt/mssql/bin/sqlservr &
      sleep 30 &&
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'PBL3') CREATE DATABASE PBL3;\" &&
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -d PBL3 -i /init.sql &&
      echo 'DB READY' &&
      wait"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: ./backend/VocabLearning
      dockerfile: Dockerfile
    container_name: vocablearning_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5152"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PBL3;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True;Connect Timeout=30;"
      Frontend__Origin: "http://localhost:${FRONTEND_PORT:-3000}"
      Frontend__AvatarPath: "/app/avatars"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "VocabLearning"
      Jwt__Audience: "VocabLearningUsers"
      Smtp__Host: "${SMTP_HOST:-smtp.gmail.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__EnableSsl: "true"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL}"
      Smtp__FromName: "VocabLearning"
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      PasswordReset__ExposeResetLinkInResponse: "false"
      Cookie__SecurePolicy: "SameAsRequest"
      Cookie__SameSite: "Lax"
      Database__AutoMigrate: "true"
    volumes:
      - avatar_data:/app/avatars
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vocablearning_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: vocablearning_sqlserver_data
  avatar_data:
    name: vocablearning_avatar_data