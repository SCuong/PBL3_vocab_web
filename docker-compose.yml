services:
  db:
    image: postgres:16-alpine
    container_name: vocablearning_postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-vocablearning}"
      POSTGRES_USER: "${POSTGRES_USER:-vocablearning}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend/VocabLearning
      dockerfile: Dockerfile
    container_name: vocablearning_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5152"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-vocablearning};Username=${POSTGRES_USER:-vocablearning};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};Pooling=true;Minimum Pool Size=0;Maximum Pool Size=100;Timeout=15;Command Timeout=30;Include Error Detail=false;GSS Encryption Mode=Disable"
      Frontend__Origin: "${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}"
      Frontend__AvatarPath: "/app/avatars"
      Smtp__Host: "${SMTP_HOST:-smtp.gmail.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__EnableSsl: "${SMTP_ENABLE_SSL:-true}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-VocabLearning}"
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID:-}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET:-}"
      Authentication__Google__CallbackPath: "${GOOGLE_CALLBACK_PATH:-/signin-google}"
      PasswordReset__ExposeResetLinkInResponse: "false"
      EmailVerification__ExposeVerificationLinkInResponse: "false"
      Cookie__SecurePolicy: "Always"
      Cookie__SameSite: "None"
      Database__AutoMigrate: "false"
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
    ports:
      - "${BACKEND_PORT:-5152}:5152"
    volumes:
      - avatar_data:/app/avatars
    restart: unless-stopped

volumes:
  postgres_data:
    name: vocablearning_postgres_data
  avatar_data:
    name: vocablearning_avatar_data
