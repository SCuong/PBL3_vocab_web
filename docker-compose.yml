version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  PBL3 VocabLearning — Production Docker Compose
#
#  Lần đầu chạy:
#    1. cp .env.example .env        (điền passwords/secrets)
#    2. docker compose up --build   (build images + khởi động)
#
#  Các lần sau:
#    docker compose up -d           (chạy nền)
#    docker compose down            (tắt)
#    docker compose logs -f         (xem log)
#
#  Truy cập: http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── SQL Server 2022 ──────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vocablearning_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "1433:1433"        # Bỏ dòng này nếu không cần truy cập DB từ ngoài
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD"
        -Q "SELECT 1" -No -l 5 || exit 1
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── ASP.NET Core 10 Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/VocabLearning
      dockerfile: Dockerfile
    container_name: vocablearning_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5152"

      # Connection string — "db" = tên service SQL Server ở trên
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=PBL3;User Id=sa;Password=${SA_PASSWORD};
        TrustServerCertificate=True;MultipleActiveResultSets=True;
        Connect Timeout=30;

      # CORS — phải khớp với port người dùng truy cập
      Frontend__Origin: "http://localhost:${FRONTEND_PORT:-3000}"

      # Avatar directory trong container (mount volume bên dưới)
      Frontend__AvatarPath: "/app/avatars"

      # JWT
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "VocabLearning"
      Jwt__Audience: "VocabLearningUsers"

      # SMTP
      Smtp__Host: "${SMTP_HOST:-smtp.gmail.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__EnableSsl: "true"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL}"
      Smtp__FromName: "VocabLearning"

      # Google OAuth (để trống nếu không dùng)
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"

      # Tắt expose reset link trong production
      PasswordReset__ExposeResetLinkInResponse: "false"

      # Cookie policy — HTTP-only Docker không có HTTPS nên dùng Lax/SameAsRequest
      # (xem appsettings.Production.json)
      Cookie__SecurePolicy: "SameAsRequest"
      Cookie__SameSite: "Lax"

    volumes:
      # Avatar files được share giữa backend và có thể mount từ host
      - avatar_data:/app/avatars
    restart: unless-stopped

  # ── Nginx + React Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vocablearning_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

# ── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  sqlserver_data:
    name: vocablearning_sqlserver_data
  avatar_data:
    name: vocablearning_avatar_data
