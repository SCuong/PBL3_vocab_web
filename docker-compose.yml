services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vocablearning_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD is required}"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD is required}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init.sql:/init.sql:ro
    command: >
      /bin/bash -c '
      set -euo pipefail;
      /opt/mssql/bin/sqlservr &
      sql_pid=$$!;
      echo "Waiting for SQL Server readiness...";
      until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SET NOCOUNT ON; SELECT 1" > /dev/null 2>&1; do
        sleep 2;
      done;
      db_exists=$$(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -h -1 -W -Q "SET NOCOUNT ON; SELECT CASE WHEN DB_ID(CHAR(80)+CHAR(66)+CHAR(76)+CHAR(51)) IS NULL THEN 0 ELSE 1 END");
      if [ "$$db_exists" = "0" ]; then
        echo "Creating PBL3 and running init.sql...";
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "CREATE DATABASE [PBL3]";
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -d PBL3 -i /init.sql;
      else
        echo "PBL3 already exists, skipping init.sql.";
      fi;
      wait "$$sql_pid"
      '
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SET NOCOUNT ON; SELECT 1\" > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./backend/VocabLearning
      dockerfile: Dockerfile
    container_name: vocablearning_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5152"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PBL3;User Id=sa;Password=${SA_PASSWORD:?SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=True;Connect Timeout=30;"
      Frontend__Origin: "${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}"
      Frontend__AvatarPath: "/app/avatars"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "VocabLearning"
      Jwt__Audience: "VocabLearningUsers"
      Smtp__Host: "${SMTP_HOST:-smtp.gmail.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__EnableSsl: "true"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL}"
      Smtp__FromName: "VocabLearning"
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      Authentication__Google__CallbackPath: "${GOOGLE_CALLBACK_PATH:-/signin-google}"
      PasswordReset__ExposeResetLinkInResponse: "false"
      Cookie__SecurePolicy: "${COOKIE_SECURE_POLICY:-Always}"
      Cookie__SameSite: "${COOKIE_SAMESITE:-None}"
      Database__AutoMigrate: "true"
      Gemini__ApiKey: "${Gemini__ApiKey}"
    ports:
      - "${BACKEND_PORT:-5152}:5152"
    volumes:
      - avatar_data:/app/avatars
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: vocablearning_sqlserver_data
  avatar_data:
    name: vocablearning_avatar_data
