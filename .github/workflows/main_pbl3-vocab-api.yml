# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# trigger workflow sync
name: Build and deploy ASP.Net Core app to Azure Web App - pbl3-vocab-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore backend/VocabLearning/VocabLearning.csproj

      - name: Build
        run: dotnet build backend/VocabLearning/VocabLearning.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/VocabLearning/VocabLearning.csproj -c Release -o "${{ env.DOTNET_ROOT }}/publish" --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.DOTNET_ROOT }}/publish

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: pbl3-vocab-api
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
